services:
  server:
    build:
      context: ./server
    container_name: gitpr-ai-server
    env_file:
      - ./server/.env
    ports:
      - "${SERVER_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  client:
    build:
      context: ./client
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    container_name: gitpr-ai-client
    ports:
      - "${CLIENT_PORT:-3000}:3000"
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped
